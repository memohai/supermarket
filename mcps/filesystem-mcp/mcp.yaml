name: filesystem-mcp
description: File system MCP server providing read/write access, directory listing, search, and file management via SSE transport.
author:
  name: Anthropic
  email: support@anthropic.com
transport: sse
homepage: https://github.com/anthropics/filesystem-mcp
tags:
  - filesystem
  - files
  - tools

url: http://localhost:3100/sse

env:
  - key: ALLOWED_DIRS
    description: Comma-separated list of directories the server is allowed to access
    defaultValue: "/tmp"
