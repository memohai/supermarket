name: openai-api
description: OpenAI API MCP server for interacting with GPT models, embeddings, and image generation via streamable HTTP transport.
author:
  name: OpenAI
  email: support@openai.com
transport: http
homepage: https://platform.openai.com
tags:
  - ai
  - llm
  - openai

url: https://api.openai.com/v1/mcp

headers:
  - key: Authorization
    description: Bearer token for OpenAI API authentication
    defaultValue: "Bearer ${OPENAI_API_KEY}"

env:
  - key: OPENAI_API_KEY
    description: OpenAI API key
    defaultValue: ""
