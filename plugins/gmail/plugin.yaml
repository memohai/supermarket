schema_version: "1"
id: gmail
name: Gmail
version: 0.1.0
description: Official remote Gmail MCP server for Gmail search, threads, labels, and draft-only email composition.
author:
  name: Google
  email: support@google.com
icon:
  kind: external_url
  url: https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico
homepage: https://developers.google.com/workspace/gmail/api/guides/configure-mcp-server
tags:
  - google
  - gmail
  - email
capabilities:
  - search
  - threads
  - labels
  - drafts
auth_requirements:
  - key: gmail_oauth
    type: managed_oauth
    client_ref: google
    scopes:
      - https://www.googleapis.com/auth/gmail.modify
      - https://www.googleapis.com/auth/gmail.compose
mcps:
  - key: gmail
    display_name: Gmail MCP
    description: Official remote Gmail MCP resource managed by the Gmail plugin. Memoh policy treats Gmail composition as draft-only.
    transport: http
    url: https://gmailmcp.googleapis.com/mcp/v1
    auth_ref: gmail_oauth
    visibility: hidden
    capabilities:
      - search
      - threads
      - labels
      - drafts
