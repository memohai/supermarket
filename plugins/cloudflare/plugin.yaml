schema_version: "1"
id: cloudflare
name: Cloudflare
version: 0.1.0
description: Official remote Cloudflare MCP server for managing Cloudflare accounts, zones, Workers, DNS, R2, KV, and related resources.
author:
  name: Cloudflare
  email: support@cloudflare.com
icon:
  kind: external_url
  url: https://www.cloudflare.com/favicon.ico
homepage: https://developers.cloudflare.com/agents/model-context-protocol/cloudflare/servers-for-cloudflare/
tags:
  - cloudflare
  - infrastructure
  - devtools
capabilities:
  - accounts
  - zones
  - workers
  - dns
  - storage
auth_requirements:
  - key: cloudflare_oauth
    type: managed_oauth
mcps:
  - key: cloudflare
    display_name: Cloudflare MCP
    description: Official remote Cloudflare MCP resource managed by the Cloudflare plugin.
    transport: http
    url: https://mcp.cloudflare.com/mcp
    auth_ref: cloudflare_oauth
    visibility: hidden
    capabilities:
      - accounts
      - zones
      - workers
      - dns
      - storage
