schema_version: "1"
id: github
name: GitHub
version: 0.1.0
description: GitHub MCP server providing repository management, issue tracking, pull request operations, and code search capabilities.
author:
  name: GitHub
  email: support@github.com
icon:
  kind: external_url
  url: https://github.githubassets.com/favicons/favicon.svg
homepage: https://github.com/github/github-mcp-server
tags:
  - github
  - git
  - devtools
capabilities:
  - repositories
  - issues
  - pull-requests
  - code-search
auth_requirements:
  - key: github_oauth
    type: managed_oauth
    client_ref: github
    scopes:
      - repo
      - read:org
mcps:
  - key: github
    display_name: GitHub MCP
    description: Hidden MCP resource managed by the GitHub plugin.
    transport: http
    url: https://api.githubcopilot.com/mcp/
    auth_ref: github_oauth
    visibility: hidden
    capabilities:
      - repositories
      - issues
      - pull-requests
