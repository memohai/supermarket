schema_version: "1"
id: github
name: GitHub
version: 0.1.0
description: GitHub MCP server providing repository management, issue tracking, pull request operations, and code search capabilities.
author:
  name: GitHub
  email: support@github.com
icon:
  kind: external_url
  url: https://github.githubassets.com/favicons/favicon.svg
homepage: https://github.com/github/github-mcp-server
tags:
  - github
  - git
  - devtools
capabilities:
  - repositories
  - issues
  - pull-requests
  - code-search
variables:
  - key: GITHUB_TOKEN
    description: GitHub personal access token.
    defaultValue: ""
auth_requirements:
  - key: github_token
    type: user_secret
    variables:
      - GITHUB_TOKEN
mcps:
  - key: github
    display_name: GitHub MCP
    description: Hidden MCP resource managed by the GitHub plugin.
    transport: http
    url: https://api.githubcopilot.com/mcp/
    headers:
      - key: Authorization
        description: GitHub personal access token.
        defaultValue: Bearer ${GITHUB_TOKEN}
    auth_ref: github_token
    visibility: hidden
    capabilities:
      - repositories
      - issues
      - pull-requests
