schema_version: "1"
id: slack
name: Slack
version: 0.1.0
description: Official remote Slack MCP server for searching messages, reading channel context, files, users, and Slack conversations.
author:
  name: Slack
  email: support@slack.com
icon:
  kind: external_url
  url: https://a.slack-edge.com/80588/marketing/img/meta/favicon-32.png
homepage: https://docs.slack.dev/ai/slack-mcp-server
tags:
  - slack
  - communication
  - productivity
capabilities:
  - messages
  - channels
  - search
  - files
  - users
auth_requirements:
  - key: slack_oauth
    type: managed_oauth
    client_ref: slack
    scopes:
      - search:read.public
      - search:read.private
      - search:read.mpim
      - search:read.im
      - search:read.files
      - files:read
      - emoji:read
      - search:read.users
      - channels:history
      - groups:history
      - mpim:history
      - im:history
      - channels:read
      - groups:read
      - mpim:read
      - users:read
      - users:read.email
mcps:
  - key: slack
    display_name: Slack MCP
    description: Official remote Slack MCP resource managed by the Slack plugin.
    transport: http
    url: https://mcp.slack.com/mcp
    auth_ref: slack_oauth
    visibility: hidden
    capabilities:
      - messages
      - channels
      - search
      - files
      - users
