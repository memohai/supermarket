schema_version: "1"
id: google-calendar
name: Google Calendar
version: 0.1.0
description: Official remote Google Calendar MCP server for calendar lookup, event planning, and schedule management.
author:
  name: Google
  email: support@google.com
icon:
  kind: external_url
  url: https://ssl.gstatic.com/calendar/images/dynamiclogo_2020q4/calendar_31_2x.png
homepage: https://developers.google.com/workspace/calendar/api/guides/configure-mcp-server
tags:
  - google
  - calendar
  - productivity
capabilities:
  - events
  - calendars
  - scheduling
auth_requirements:
  - key: google_calendar_oauth
    type: managed_oauth
    client_ref: google
    scopes:
      - https://www.googleapis.com/auth/calendar
mcps:
  - key: google-calendar
    display_name: Google Calendar MCP
    description: Official remote Google Calendar MCP resource managed by the Google Calendar plugin.
    transport: http
    url: https://calendarmcp.googleapis.com/mcp/v1
    auth_ref: google_calendar_oauth
    visibility: hidden
    capabilities:
      - events
      - calendars
      - scheduling
