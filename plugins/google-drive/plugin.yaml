schema_version: "1"
id: google-drive
name: Google Drive
version: 0.1.0
description: Official remote Google Drive MCP server for searching, reading, and managing Drive files with user authorization.
author:
  name: Google
  email: support@google.com
icon:
  kind: external_url
  url: https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png
homepage: https://developers.google.com/workspace/drive/api/guides/configure-mcp-server
tags:
  - google
  - drive
  - productivity
capabilities:
  - files
  - search
  - sharing
auth_requirements:
  - key: google_drive_oauth
    type: managed_oauth
    client_ref: google
    scopes:
      - https://www.googleapis.com/auth/drive
mcps:
  - key: google-drive
    display_name: Google Drive MCP
    description: Official remote Google Drive MCP resource managed by the Google Drive plugin.
    transport: http
    url: https://drivemcp.googleapis.com/mcp/v1
    auth_ref: google_drive_oauth
    visibility: hidden
    capabilities:
      - files
      - search
      - sharing
