schema_version: "1"
id: stripe
name: Stripe
version: 0.1.0
description: Official Stripe MCP server configured for read-only finance, billing, customer, invoice, subscription, product, and payment analysis.
author:
  name: Stripe
  email: support@stripe.com
icon:
  kind: external_url
  url: https://stripe.com/favicon.ico
homepage: https://docs.stripe.com/mcp
tags:
  - stripe
  - payments
  - billing
  - finance
  - read-only
capabilities:
  - customers
  - invoices
  - subscriptions
  - products
  - prices
  - payments
  - reporting
variables:
  - key: STRIPE_RESTRICTED_KEY
    description: Stripe restricted API key with read-only permissions for the resources this bot may inspect.
    required: true
    secret: true
auth_requirements:
  - key: stripe_restricted_key
    type: user_secret
    variables:
      - STRIPE_RESTRICTED_KEY
mcps:
  - key: stripe
    display_name: Stripe MCP (read-only)
    description: Official Stripe remote MCP resource filtered to read-only tools. Use a Stripe restricted API key with read-only permissions as an additional boundary.
    transport: http
    url: https://mcp.stripe.com
    headers:
      - key: Authorization
        defaultValue: "Bearer ${STRIPE_RESTRICTED_KEY}"
        description: Stripe restricted API key bearer token.
        required: true
        secret: true
    auth_ref: stripe_restricted_key
    visibility: hidden
    allowed_tools:
      - stripe_api_read
      - stripe_api_search
      - stripe_api_details
      - search_stripe_resources
      - fetch_stripe_resources
      - get_stripe_account_info
    capabilities:
      - customers
      - invoices
      - subscriptions
      - products
      - prices
      - payments
      - reporting
