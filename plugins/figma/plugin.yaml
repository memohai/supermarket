schema_version: "1"
id: figma
name: Figma
version: 0.1.0
description: Official remote Figma MCP server for design context, files, components, variables, and implementation workflows.
author:
  name: Figma
  email: support@figma.com
icon:
  kind: external_url
  url: https://static.figma.com/app/icon/1/favicon.svg
homepage: https://developers.figma.com/docs/figma-mcp-server/remote-server-installation/
tags:
  - figma
  - design
  - devtools
capabilities:
  - design-context
  - files
  - components
  - variables
auth_requirements:
  - key: figma_oauth
    type: managed_oauth
    client_ref: figma
    scopes:
      - mcp:connect
mcps:
  - key: figma
    display_name: Figma MCP
    description: Official remote Figma MCP resource managed by the Figma plugin.
    transport: http
    url: https://mcp.figma.com/mcp
    auth_ref: figma_oauth
    visibility: hidden
    capabilities:
      - design-context
      - files
      - components
      - variables
